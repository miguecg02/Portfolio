<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMChess3D - Ajedrez 3D</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♟️</text></svg>">
    <style>
        /* ... (estilos permanecen igual) ... */
    </style>
</head>
<body>
    <!-- ... (HTML permanece igual) ... -->

    <script type="module">
        // Estado de carga de recursos
        const loadStatus = {
            three: false,
            tween: false,
            chessGame: false,
            board: false,
            pieces: false,
            abstractPiece: false,
            materialSets: false,
            scene: false
        };

        // Función para actualizar el panel de debug
        function updateDebugInfo() {
            const debugInfo = document.getElementById('debug-info');
            if (!debugInfo) return;

            debugInfo.innerHTML = `
                <div>WebGL: ${webglAvailable() ? '✅' : '❌'}</div>
                <div>Canvas: ${document.getElementById('chessCanvas') ? '✅' : '❌'}</div>
                <div>THREE: ${loadStatus.three ? '✅' : '❌'}</div>
                <div>TWEEN: ${loadStatus.tween ? '✅' : '❌'}</div>
                <div>ChessGame: ${loadStatus.chessGame ? '✅' : '❌'}</div>
                <div>Board: ${loadStatus.board ? '✅' : '❌'}</div>
                <div>Pieces: ${loadStatus.pieces ? '✅' : '❌'}</div>
                <div>AbstractPiece: ${loadStatus.abstractPiece ? '✅' : '❌'}</div>
                <div>MaterialSets: ${loadStatus.materialSets ? '✅' : '❌'}</div>
                <div>Scene: ${loadStatus.scene ? '✅' : '❌'}</div>
            `;
        }

        // Función para actualizar el estado de carga
        function updateLoadingText(text) {
            const loadingDetails = document.getElementById('loading-details');
            if (loadingDetails) {
                loadingDetails.textContent = text;
            }
            console.log(text);
            updateDebugInfo();
        }

        // Función para cargar módulos con reintentos
        async function loadModule(modulePath, moduleName, maxRetries = 3) {
            updateLoadingText(`Cargando ${moduleName}...`);
            console.log(`Intentando cargar: ${modulePath}`);

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const module = await import(modulePath);
                    console.log(`${moduleName} cargado correctamente desde ${modulePath}`);
                    return module;
                } catch (error) {
                    console.error(`Intento ${i+1} fallido para ${moduleName} en ${modulePath}:`, error);
                    updateLoadingText(`Intento ${i+1} fallido para ${moduleName}: ${error.message}`);

                    if (i === maxRetries - 1) {
                        throw new Error(`No se pudo cargar ${moduleName} desde ${modulePath}: ${error.message}`);
                    }

                    // Esperar antes de reintentar
                    await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1)));
                }
            }
        }

        // Función para verificar si un archivo existe
        async function checkFileExists(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok;
            } catch (error) {
                console.error(`Error al verificar ${url}:`, error);
                return false;
            }
        }

        // Intentar cargar los módulos principales
        async function loadChessGame() {
            try {
                // Primero cargar Three.js y TWEEN.js
                updateLoadingText("Cargando THREE.js...");
                try {
                    const threeModule = await import('./TMChess3D/libs/three.module.js');
                    window.THREE = threeModule;
                    loadStatus.three = true;
                    console.log('THREE.js cargado correctamente');
                } catch (error) {
                    console.error('Error al cargar THREE.js:', error);
                    throw new Error('Three.js no se pudo cargar: ' + error.message);
                }

                updateLoadingText("Cargando TWEEN.js...");
                try {
                    const tweenModule = await import('./TMChess3D/libs/tween.module.js');
                    window.TWEEN = tweenModule;
                    loadStatus.tween = true;
                    console.log('TWEEN.js cargado correctamente');
                } catch (error) {
                    console.error('Error al cargar TWEEN.js:', error);
                    throw new Error('Tween.js no se pudo cargar: ' + error.message);
                }

                // Verificar si los archivos existen antes de intentar cargarlos
                updateLoadingText("Verificando archivos...");
                
                const filesToCheck = [
                    './TMChess3D/Objects/Pieces/AbstractPiece.js',
                    './TMChess3D/Objects/Pieces/AllPieces.js',
                    './TMChess3D/our_libs/chess/game_handler.js',
                    './TMChess3D/Objects/Board.js',
                    './TMChess3D/Objects/Pieces/Materials/MaterialSetLibrary.js',
                    './TMChess3D/Scene.js'
                ];

                for (const file of filesToCheck) {
                    const exists = await checkFileExists(file);
                    console.log(`${file} ${exists ? 'existe' : 'NO existe'}`);
                    if (!exists) {
                        throw new Error(`Archivo no encontrado: ${file}`);
                    }
                }

                // Cambiar el orden de carga: AbstractPiece primero
                updateLoadingText("Cargando AbstractPiece...");
                try {
                    const abstractPieceModule = await loadModule('./TMChess3D/Objects/Pieces/AbstractPiece.js', 'AbstractPiece');
                    window.AbstractPiece = abstractPieceModule.AbstractPiece;
                    loadStatus.abstractPiece = true;
                } catch (error) {
                    console.error('Error al cargar AbstractPiece:', error);
                    throw new Error('AbstractPiece no se pudo cargar: ' + error.message);
                }

                // Ahora cargar Pieces (que probablemente depende de AbstractPiece)
                updateLoadingText("Cargando Pieces...");
                try {
                    const piecesModule = await loadModule('./TMChess3D/Objects/Pieces/AllPieces.js', 'Pieces');
                    window.Pieces = piecesModule;
                    loadStatus.pieces = true;
                } catch (error) {
                    console.error('Error al cargar Pieces:', error);
                    throw new Error('Pieces no se pudo cargar: ' + error.message);
                }

                // Cargar los demás módulos
                updateLoadingText("Cargando ChessGame...");
                try {
                    const chessGameModule = await loadModule('./TMChess3D/our_libs/chess/game_handler.js', 'ChessGame');
                    window.ChessGame = chessGameModule.ChessGame;
                    loadStatus.chessGame = true;
                } catch (error) {
                    console.error('Error al cargar ChessGame:', error);
                    throw new Error('ChessGame no se pudo cargar: ' + error.message);
                }

                updateLoadingText("Cargando Board...");
                try {
                    const boardModule = await loadModule('./TMChess3D/Objects/Board.js', 'Board');
                    window.Board = boardModule.Board;
                    loadStatus.board = true;
                } catch (error) {
                    console.error('Error al cargar Board:', error);
                    throw new Error('Board no se pudo cargar: ' + error.message);
                }

                updateLoadingText("Cargando MaterialSets...");
                try {
                    const materialSetsModule = await loadModule('./TMChess3D/Objects/Pieces/Materials/MaterialSetLibrary.js', 'MaterialSets');
                    window.PiceMaterialSets = materialSetsModule;
                    loadStatus.materialSets = true;
                } catch (error) {
                    console.error('Error al cargar MaterialSets:', error);
                    throw new Error('MaterialSets no se pudo cargar: ' + error.message);
                }

                // Finalmente cargar la escena principal
                updateLoadingText("Cargando Scene...");
                try {
                    const sceneModule = await loadModule('./TMChess3D/Scene.js', 'Scene');
                    loadStatus.scene = true;

                    // Inicializar la escena después de cargar todo
                    initializeScene(sceneModule);
                } catch (error) {
                    console.error('Error al cargar Scene:', error);
                    throw new Error('Scene no se pudo cargar: ' + error.message);
                }

                console.log('Todos los módulos cargados correctamente');
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error('Error crítico al cargar el juego:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';

                const errorDetails = document.getElementById('error-details');
                if (errorDetails) {
                    errorDetails.innerHTML = `
                        <strong>Detalles del error:</strong><br>
                        ${error.message}<br><br>
                        <strong>Estado de carga:</strong><br>
                        <pre>${JSON.stringify(loadStatus, null, 2)}</pre>
                    `;
                }
            }
        }

        // Función para inicializar la escena
        function initializeScene(SceneModule) {
            try {
                updateLoadingText("Inicializando escena...");

                // Verificar que todos los módulos necesarios estén disponibles
                const requiredModules = ['THREE', 'TWEEN', 'ChessGame', 'Board', 'Pieces', 'AbstractPiece'];
                for (const module of requiredModules) {
                    if (!window[module]) {
                        throw new Error(`Módulo requerido ${module} no disponible`);
                    }
                }

                // Crear la escena usando el canvas existente
                const scene = new SceneModule.MyScene("#chessCanvas");

                // Configurar event listeners
                window.addEventListener("resize", () => scene.onWindowResize());
                window.addEventListener("click", () => scene.onClick());
                window.addEventListener("mousemove", (event) => scene.onMouseMove(event));
                window.addEventListener("keydown", (event) => scene.onKeyDown(event));

                // Iniciar el bucle de renderizado
                scene.update();

                console.log('Escena inicializada correctamente');
                updateLoadingText("Escena inicializada correctamente");

            } catch (error) {
                console.error('Error al inicializar la escena:', error);
                throw new Error(`Error al inicializar la escena: ${error.message}`);
            }
        }

        // Iniciar la carga cuando el documento esté listo
        document.addEventListener('DOMContentLoaded', () => {
            if (!webglAvailable()) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML =
                    '<p>Tu navegador no soporta WebGL, que es necesario para este juego.</p>' +
                    '<p>Por favor, actualiza tu navegador o usa uno más moderno como Chrome, Firefox o Edge.</p>';
                return;
            }

            // Iniciar la carga del juego
            loadChessGame();

            // Mostrar panel de debug después de 3 segundos si hay problemas
            setTimeout(() => {
                if (!loadStatus.three || !loadStatus.tween) {
                    document.getElementById('debug-panel').style.display = 'block';
                    updateDebugInfo();
                }
            }, 3000);
        });
    </script>

    <script>
        function retryLoad() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-details').textContent = '';
            location.reload();
        }

        function toggleDebug() {
            const debugPanel = document.getElementById('debug-panel');
            debugPanel.style.display = debugPanel.style.display === 'block' ? 'none' : 'block';
            updateDebugInfo();
        }

        // Verificar compatibilidad con WebGL
        function webglAvailable() {
            try {
                const canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext &&
                    (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
            } catch (e) {
                return false;
            }
        }
    </script>
</body>
</html>
